<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      padding: 40px;
      color: var(--text-main);
    }

    .rename-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
    }

    .header {
      margin-bottom: 20px;
    }

    .header h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .badge {
      background: #e0e7ff;
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .btn-apply {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }

    .btn-apply:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="rename-card">
  <div class="header">
    <h2>Smart Rename</h2>
  </div>

  <div class="input-group">
    <div class="label-row">
      <label>Transformation Type</label>
      <span class="badge">v2 Engine</span>
    </div>
    <select>
      <option>RegEx + Replace</option>
      <option>Simple Replace</option>
      <option>Change Case Only</option>
      <option>Keep Original Name</option>
    </select>
  </div>

  <div class="input-group">
    <label>Find / Pattern</label>
    <input type="text" placeholder="e.g. ^(\d+) - (.*)$">
  </div>

  <div class="input-group">
    <label>Replace With</label>
    <input type="text" placeholder="e.g. $2 ($1)">
  </div>

  <div class="input-group">
    <label>Case Format</label>
    <select>
      <option>Same as original</option>
      <option>Sentence case</option>
      <option>lowercase</option>
      <option>UPPERCASE</option>
      <option>Title Case</option>
    </select>
  </div>

  <div class="options-grid">
    <label class="checkbox-item">
      <input type="checkbox" checked> Include Ext.
    </label>
    <label class="checkbox-item">
      <input type="checkbox"> Match Case
    </label>
    <label class="checkbox-item">
      <input type="checkbox"> First Match Only
    </label>
    <label class="checkbox-item">
      <input type="checkbox" checked> Use Regex
    </label>
  </div>

  <button class="btn-apply">Preview Changes</button>
</div>

</body>
</html>
